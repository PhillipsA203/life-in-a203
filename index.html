<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Room A203 — Mr. Phillips' Business Class</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesque:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4ece0; --paper-2:#ece1d0; --ink:#1c1714; --ink-soft:#5a4f45;
    --accent:#b5431f; --accent-2:#3b5d52; --line:#d8cbb6; --card:#fbf6ee;
    --wood:#9a6a39; --wood-dark:#7a5025; --shadow:rgba(40,28,18,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(ellipse 60% 42% at 50% -6%, rgba(181,67,31,.12), transparent 60%),
      repeating-radial-gradient(circle at -6% -10%, rgba(28,23,20,.05) 0 1px, transparent 1px 13px),
      repeating-radial-gradient(circle at 106% 112%, rgba(28,23,20,.045) 0 1px, transparent 1px 15px),
      radial-gradient(circle at 14% 16%, rgba(181,67,31,.07), transparent 44%),
      radial-gradient(circle at 86% 6%, rgba(59,93,82,.08), transparent 42%),
      linear-gradient(rgba(28,23,20,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(28,23,20,.035) 1px, transparent 1px);
    background-size:auto,auto,auto,auto,auto,36px 36px,36px 36px;
    background-attachment:fixed;
    color:var(--ink);font-family:"Hanken Grotesque",sans-serif;line-height:1.5;
    min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  /* Shark-tank backdrop: faint water line + fins behind everything */
  .tank{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none}
  /* Header */
  header{text-align:center;padding:46px 24px 8px;position:relative}
  .kicker{font-size:.78rem;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(2.3rem,6vw,4.2rem);line-height:.98;letter-spacing:-.02em;margin-top:8px}
  .sub{margin-top:10px;color:var(--ink-soft);font-size:1.05rem}
  .sub b{color:var(--ink)}
  .namebar{font-size:.82rem;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-top:10px}

  /* Scene */
  .scene{max-width:1080px;margin:30px auto 10px;padding:0 22px 40px;
    display:grid;grid-template-columns:repeat(6,1fr);gap:22px}
  .tile{position:relative;border:1.6px solid var(--line);border-radius:14px;background:var(--card);
    padding:22px 18px 18px;cursor:pointer;text-align:center;text-decoration:none;color:inherit;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    box-shadow:0 6px 18px var(--shadow);transition:transform .2s ease,box-shadow .2s ease,border-color .2s;
    animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .tile:hover{transform:translateY(-6px);box-shadow:0 18px 38px var(--shadow);border-color:var(--accent)}
  .tile:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
  .tile .art{width:100%;height:140px;display:flex;align-items:flex-end;justify-content:center}
  .tile .art svg{max-height:140px;width:auto}
  .tile .label{font-family:"Fraunces",serif;font-weight:900;font-size:1.32rem;line-height:1.05;margin-top:8px}
  .tile .desc{color:var(--ink-soft);font-size:.92rem}
  .tile .ground{width:64%;height:11px;border-radius:50%;background:rgba(40,28,18,.16);filter:blur(4px);margin-top:-4px}
  /* featured + spans */
  .tile.stacks{grid-column:span 3}
  .tile.museum{grid-column:span 3}
  .tile.agenda,.tile.schoolwork,.tile.expectations{grid-column:span 2}
  .tile.stacks .art,.tile.museum .art{height:188px}
  .tile.stacks .art svg,.tile.museum .art svg{max-height:188px}
  .tile.stacks .label{font-size:1.7rem}
  .badge{position:absolute;top:13px;right:13px;background:var(--accent-2);color:#fff;font-size:.66rem;
    font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:100px}
  .pickhint{font-size:.74rem;color:var(--accent);font-weight:700;letter-spacing:.05em;text-transform:uppercase}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(28,23,20,.55);backdrop-filter:blur(4px);z-index:100;
    display:none;align-items:center;justify-content:center;padding:30px 20px}
  .overlay.open{display:flex}
  .modal{background:var(--card);border-radius:14px;max-width:460px;width:100%;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.4);animation:pop .26s cubic-bezier(.2,.8,.3,1) both}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
  .modal-head{padding:22px 24px 14px;border-bottom:1px solid var(--line);position:relative}
  .modal-head .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .modal-head h3{font-family:"Fraunces",serif;font-weight:900;font-size:1.5rem;margin-top:5px}
  .close{position:absolute;top:14px;right:16px;width:32px;height:32px;border:none;border-radius:50%;
    background:var(--paper-2);cursor:pointer;font-size:1.25rem;color:var(--ink)}
  .close:hover{background:var(--accent);color:#fff}
  .modal-body{padding:18px 24px 24px}
  .classbtn{display:flex;align-items:center;justify-content:space-between;width:100%;text-decoration:none;
    border:1.6px solid var(--line);border-radius:10px;padding:13px 16px;margin-bottom:10px;color:var(--ink);
    font-weight:600;font-size:1rem;background:#fff;transition:border-color .15s,transform .12s}
  .classbtn:hover{border-color:var(--accent);transform:translateX(2px)}
  .classbtn .go{color:var(--accent);font-weight:700;font-size:.85rem}
  .classbtn.soon{cursor:default;color:var(--ink-soft);background:var(--paper)}
  .classbtn.soon:hover{border-color:var(--line);transform:none}
  .classbtn.soon .go{color:var(--ink-soft);font-style:italic}
  .contactcard{text-align:center}
  .contactcard .nm{font-family:"Fraunces",serif;font-weight:900;font-size:1.4rem}
  .contactcard .row{color:var(--ink-soft);margin-top:4px}
  .contactcard a{color:var(--accent);font-weight:700;text-decoration:none}
  .exp{margin-top:16px;text-align:left;background:var(--paper);border-left:4px solid var(--accent-2);
    border-radius:8px;padding:12px 14px;color:var(--ink);font-size:.95rem;white-space:pre-line}
  footer{text-align:center;padding:26px 24px 50px;color:var(--ink-soft);font-size:.9rem;border-top:2px solid var(--ink);margin-top:10px}
  footer a{color:var(--accent);font-weight:700;text-decoration:none}

  @media(max-width:820px){
    .scene{grid-template-columns:repeat(2,1fr);gap:16px}
    .tile.stacks,.tile.museum{grid-column:span 2}
    .tile.agenda,.tile.schoolwork,.tile.expectations{grid-column:span 1}
    .tile.expectations{grid-column:span 2}
  }
  @media(max-width:520px){
    .scene{grid-template-columns:1fr}
    .tile,.tile.stacks,.tile.museum,.tile.agenda,.tile.schoolwork,.tile.expectations{grid-column:span 1}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

    <path d="M-20 840 q 120 -22 240 0 t 240 0 t 240 0 t 240 0 t 240 0 t 240 0 t 240 0" opacity="0.7"/>

        <!-- screen / board -->

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
/* ============================================================================
   ⬇  EDIT THIS SECTION  ⬇   — links, classes, and contact info all live here.
   Add a web address between the quotes to turn a "coming soon" into a real link.
   Leave it as ""  and it shows "Link coming soon" until you're ready.
   For Google Slides: open the deck → Share → "Anyone with the link" (Viewer) →
   Copy link, and paste it here.
   ============================================================================ */
const CONFIG = {
  stacksUrl: "https://phillipsa203.github.io/Record-Catalog/",   // The Stacks catalog (live)
  museumUrl: "",                                                  // leave "" = Coming soon

  // Classes shown this semester. In January, add "Sports Marketing" and
  // "International Business" back into this list (and their links below).
  classes: ["Intro to Business", "AP Business"],

  // Google Slides agenda link for each class:
  agenda: {
    "Intro to Business":     "https://docs.google.com/presentation/d/1rG11w1OYNs8Z9noop7zBXJ1g3PtAcKWJ2zplbQlKQcE/present",
    "AP Business":           "https://docs.google.com/presentation/d/1r6aWQdxOAzIRmQ1jGaFtyaj3lXIAind9gjXtxzJ_Z4A/present"
  },

  // Schoolwork / assignments link for each class:
  schoolwork: {
    "Sports Marketing":      "",
    "Intro to Business":     "",
    "International Business": "",
    "AP Business":           ""
  },

  contact: {
    name:  "Richard Phillips",
    role:  "Business Teacher",
    room:  "Room A203",
    email: "Rphillips@rtmsd.org"
  },

  // Your class expectations (shown on the Expectations card). Edit freely:
  expectations: "Add your class expectations here.\n• Be on time and ready.\n• Respect the room, the records, and each other.\n• Phones away unless we're using them for class."
};
/* ============================================================================
   ===============================  APP CODE  =================================
   You don't need to edit anything below this line.
   ============================================================================ */
(function(){
  const overlay=document.getElementById('overlay');
  const modal=document.getElementById('modal');
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // footer contact
  document.getElementById('footName').textContent = CONFIG.contact.name;
  document.getElementById('footRoom').textContent = CONFIG.contact.room;
  const fe=document.getElementById('footEmail'); fe.textContent=CONFIG.contact.email; fe.href='mailto:'+CONFIG.contact.email;

  function openModal(html){ modal.innerHTML=html; overlay.classList.add('open'); document.body.style.overflow='hidden';
    const c=modal.querySelector('.close'); if(c) c.onclick=closeModal; }
  function closeModal(){ overlay.classList.remove('open'); document.body.style.overflow=''; }
  overlay.onclick=e=>{ if(e.target===overlay) closeModal(); };
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

  function chooser(kind,title){
    const map=CONFIG[kind];
    const rows=CONFIG.classes.map(cls=>{
      const url=(map[cls]||'').trim();
      if(url) return `<a class="classbtn" href="${esc(url)}" target="_blank" rel="noopener">${esc(cls)}<span class="go">Open →</span></a>`;
      return `<div class="classbtn soon">${esc(cls)}<span class="go">Link coming soon</span></div>`;
    }).join('');
    openModal(`<div class="modal-head"><div class="eyebrow">${esc(title)}</div><h3>Pick your class</h3>
      <button class="close" aria-label="Close">×</button></div><div class="modal-body">${rows}</div>`);
  }

  function contactModal(){
    const c=CONFIG.contact;
    openModal(`<div class="modal-head"><div class="eyebrow">Expectations &amp; Contact</div><h3>The basics</h3>
      <button class="close" aria-label="Close">×</button></div>
      <div class="modal-body"><div class="contactcard">
        <div class="nm">${esc(c.name)}</div>
        <div class="row">${esc(c.role)} · ${esc(c.room)}</div>
        <div class="row"><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></div>
      </div>
      <div class="exp">${esc(CONFIG.expectations)}</div></div>`);
  }

  function museumModal(){
    if(CONFIG.museumUrl && CONFIG.museumUrl.trim()){ window.open(CONFIG.museumUrl.trim(),'_blank','noopener'); return; }
    openModal(`<div class="modal-head"><div class="eyebrow">Museum</div><h3>Coming soon</h3>
      <button class="close" aria-label="Close">×</button></div>
      <div class="modal-body"><p style="color:var(--ink-soft)">The museum catalog is still being built — check back soon. It'll live right here, just like The Stacks.</p></div>`);
  }

  document.querySelectorAll('[data-action]').forEach((el,i)=>{
    el.style.animationDelay=(i*70)+'ms';
    el.addEventListener('click',e=>{
      const a=el.dataset.action;
      if(a==='stacks'){ e.preventDefault(); window.open(CONFIG.stacksUrl,'_blank','noopener'); }
      else if(a==='agenda'){ chooser('agenda','Class Agenda'); }
      else if(a==='schoolwork'){ chooser('schoolwork','Schoolwork'); }
      else if(a==='contact'){ contactModal(); }
      else if(a==='museum'){ museumModal(); }
    });
  });
})();
</script>
</body>
</html>
